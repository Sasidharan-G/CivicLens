name: CivicLens CI
on:
  push:
    branches: [main, develop]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: backend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip, cache-dependency-path: backend/requirements.txt}
      - run: pip install -r requirements.txt
      - run: python -m pytest -q --cov=app --cov-report=term-missing
        env: {DATABASE_URL: 'sqlite:///./ci.db', JWT_SECRET_KEY: 'ci-only-secret'}
      - run: alembic upgrade head
        env: {DATABASE_URL: 'sqlite:///./migration.db', JWT_SECRET_KEY: 'ci-only-secret'}
      - run: python -m pytest -q tests/test_migrations.py tests/test_upload_security.py
        env: {DATABASE_URL: 'sqlite:///./security-ci.db', JWT_SECRET_KEY: 'ci-only-secret'}
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with: {name: playwright-report, path: frontend/playwright-report, retention-days: 7}
