services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civiclens
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens_dev
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U civiclens"], interval: 5s, timeout: 5s, retries: 10}
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://civiclens:civiclens_dev@db:5432/civiclens
      JWT_SECRET_KEY: local-docker-secret-change-in-production
      CORS_ORIGINS: http://localhost:5173
    volumes: [uploads:/app/uploads]
    depends_on: {db: {condition: service_healthy}}
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment: {VITE_API_BASE_URL: http://localhost:8000}
    depends_on: [backend]
volumes: {postgres_data: {}, uploads: {}}

